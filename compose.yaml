services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: jazzlogs-postgres
    environment:
      POSTGRES_DB: jazzlogs
      POSTGRES_USER: jazzlogs
      POSTGRES_PASSWORD: jazzlogs
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jazzlogs -d jazzlogs"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
