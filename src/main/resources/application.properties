spring.application.name=jazzlogs
logging.level.root=${JAZZLOGS_LOG_ROOT:INFO}
logging.level.com.marcoromanofinaa.jazzlogs=${JAZZLOGS_LOG_APP:INFO}
logging.level.com.marcoromanofinaa.jazzlogs.admin.editorial.indexing=${JAZZLOGS_LOG_EDITORIAL_INDEXING:INFO}
logging.level.com.marcoromanofinaa.jazzlogs.spotify=${JAZZLOGS_LOG_SPOTIFY:INFO}
jazzlogs.ai.recommend.audit-log-path=${JAZZLOGS_RECOMMEND_AUDIT_LOG_PATH:logs/ai-recommend-requests.ndjson}
logging.level.org.springframework.web.client=${JAZZLOGS_LOG_SPRING_WEB_CLIENT:INFO}
logging.level.org.hibernate.SQL=${JAZZLOGS_LOG_HIBERNATE_SQL:INFO}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jazzlogs}
spring.datasource.username=${DB_USERNAME:jazzlogs}
spring.datasource.password=${DB_PASSWORD:jazzlogs}
spring.neo4j.uri=${NEO4J_URI:neo4j://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:jazzlogs-dev-password}
spring.data.neo4j.repositories.enabled=false

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.autoconfigure.exclude=${SPRING_AUTOCONFIGURE_EXCLUDE:\
org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration,\
org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
org.springframework.boot.data.neo4j.autoconfigure.DataNeo4jRepositoriesAutoConfiguration,\
org.springframework.boot.data.neo4j.autoconfigure.DataNeo4jReactiveRepositoriesAutoConfiguration}
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
spring.ai.openai.embedding.options.dimensions=${OPENAI_EMBEDDING_DIMENSIONS:1536}
jazzlogs.ai.recommend.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
jazzlogs.ai.recommend.openai.model=${OPENAI_CHAT_MODEL:gpt-5.4-mini}
jazzlogs.ai.recommend.openai.router-model=${OPENAI_ROUTER_MODEL:gpt-5.4-nano}
jazzlogs.ai.recommend.openai.temperature=${JAZZLOGS_AI_RECOMMEND_TEMPERATURE:1.0}
jazzlogs.ai.recommend.openai.max-completion-tokens=${JAZZLOGS_AI_RECOMMEND_MAX_COMPLETION_TOKENS:700}
jazzlogs.ai.recommend.openai.router-max-completion-tokens=${JAZZLOGS_AI_RECOMMEND_ROUTER_MAX_COMPLETION_TOKENS:600}
jazzlogs.ai.recommend.openai.raw-response-logging-enabled=${JAZZLOGS_AI_RECOMMEND_RAW_RESPONSE_LOGGING_ENABLED:false}
jazzlogs.ai.recommend.openai.reasoning-effort=${JAZZLOGS_AI_RECOMMEND_REASONING_EFFORT:low}
jazzlogs.ai.recommend.openai.verbosity=${JAZZLOGS_AI_RECOMMEND_VERBOSITY:medium}
jazzlogs.ai.recommend.openai.pro-reasoning-effort=${JAZZLOGS_AI_RECOMMEND_PRO_REASONING_EFFORT:medium}
jazzlogs.ai.recommend.openai.pro-verbosity=${JAZZLOGS_AI_RECOMMEND_PRO_VERBOSITY:high}

jazzlogs.admin.api-key=${JAZZLOGS_ADMIN_API_KEY:}
jazzlogs.auth.jwt.secret=${JAZZLOGS_AUTH_JWT_SECRET:change-me-change-me-change-me-change-me-123456}
jazzlogs.auth.jwt.expiration=PT8H
jazzlogs.spotify.oauth.client-id=${SPOTIFY_CLIENT_ID:}
jazzlogs.spotify.oauth.client-secret=${SPOTIFY_CLIENT_SECRET:}
jazzlogs.spotify.oauth.redirect-uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:8080/api/v1/spotify/callback}
jazzlogs.spotify.oauth.token-url=${SPOTIFY_TOKEN_URL:https://accounts.spotify.com/api/token}
jazzlogs.spotify.oauth.state-ttl=${SPOTIFY_OAUTH_STATE_TTL:PT10M}
jazzlogs.spotify.oauth.cleanup-retention=${SPOTIFY_OAUTH_CLEANUP_RETENTION:PT24H}
jazzlogs.spotify.oauth.redirect.success-uri=${SPOTIFY_SUCCESS_REDIRECT_URI:/spotify/connect/success}
jazzlogs.spotify.oauth.redirect.error-uri=${SPOTIFY_ERROR_REDIRECT_URI:/spotify/connect/error}
jazzlogs.spotify.api.base-url=${SPOTIFY_API_BASE_URL:https://api.spotify.com/v1}
jazzlogs.spotify.sync.official-playlist-id=${SPOTIFY_PLAYLIST_ID:}
jazzlogs.spotify.sync.official-owner-spotify-user-id=${SPOTIFY_OFFICIAL_OWNER_SPOTIFY_USER_ID:}
jazzlogs.spotify.sync.market=${SPOTIFY_MARKET:AR}
jazzlogs.spotify.sync.enabled=${SPOTIFY_SYNC_ENABLED:false}
jazzlogs.spotify.sync.cron=${SPOTIFY_SYNC_CRON:0 0 */12 * * *}
jazzlogs.spotify.sync.zone=${SPOTIFY_SYNC_ZONE:America/Argentina/Buenos_Aires}
jazzlogs.spotify.sync.sync-on-startup=${SPOTIFY_SYNC_ON_STARTUP:false}
jazzlogs.spotify.sync.page-size=${SPOTIFY_SYNC_PAGE_SIZE:50}
jazzlogs.spotify.security.token-encryption-secret=${SPOTIFY_TOKEN_ENCRYPTION_SECRET:change-me-spotify-token-encryption-secret-32}
jazzlogs.spotify.taste.time-range=${SPOTIFY_TASTE_TIME_RANGE:SHORT_TERM}
jazzlogs.spotify.taste.top-artists-limit=${SPOTIFY_TASTE_TOP_ARTISTS_LIMIT:20}
jazzlogs.spotify.taste.top-tracks-limit=${SPOTIFY_TASTE_TOP_TRACKS_LIMIT:20}
jazzlogs.outbox.processing.batch-size=${JAZZLOGS_OUTBOX_BATCH_SIZE:25}
jazzlogs.outbox.processing.max-retries=${JAZZLOGS_OUTBOX_MAX_RETRIES:5}
jazzlogs.outbox.processing.retry-delay=${JAZZLOGS_OUTBOX_RETRY_DELAY:PT2M}
jazzlogs.outbox.processing.retry-backoff-multiplier=${JAZZLOGS_OUTBOX_RETRY_BACKOFF_MULTIPLIER:2}
jazzlogs.outbox.processing.cron=${JAZZLOGS_OUTBOX_CRON:0 */1 * * * *}
jazzlogs.outbox.processing.zone=${JAZZLOGS_OUTBOX_ZONE:America/Argentina/Buenos_Aires}
jazzlogs.chat.history.recent-exchanges-limit=${JAZZLOGS_CHAT_RECENT_EXCHANGES_LIMIT:5}
jazzlogs.chat.usage.monthly-credit-limit.FREE=${JAZZLOGS_CHAT_USAGE_MONTHLY_CREDIT_LIMIT_FREE:200}
jazzlogs.chat.usage.monthly-credit-limit.TRIAL=${JAZZLOGS_CHAT_USAGE_MONTHLY_CREDIT_LIMIT_TRIAL:400}
jazzlogs.chat.usage.monthly-credit-limit.PLUS=${JAZZLOGS_CHAT_USAGE_MONTHLY_CREDIT_LIMIT_PLUS:1500}
jazzlogs.chat.usage.monthly-credit-limit.PRO=${JAZZLOGS_CHAT_USAGE_MONTHLY_CREDIT_LIMIT_PRO:6000}
jazzlogs.chat.usage.minimum-balance-required-credits.BASIC=${JAZZLOGS_CHAT_USAGE_MIN_CREDITS_BASIC:1}
jazzlogs.chat.usage.minimum-balance-required-credits.PRO=${JAZZLOGS_CHAT_USAGE_MIN_CREDITS_PRO:15}
jazzlogs.chat.usage.minimum-balance-required-credits.PLAYLIST=${JAZZLOGS_CHAT_USAGE_MIN_CREDITS_PLAYLIST:5}
jazzlogs.chat.usage.stage-credit-cost.ROUTER=${JAZZLOGS_CHAT_USAGE_CREDIT_COST_ROUTER:1}
jazzlogs.chat.usage.stage-credit-cost.EMPTY_FALLBACK=${JAZZLOGS_CHAT_USAGE_CREDIT_COST_EMPTY_FALLBACK:1}
jazzlogs.chat.usage.stage-credit-cost.BASIC_RECOMMENDATION=${JAZZLOGS_CHAT_USAGE_CREDIT_COST_BASIC_RECOMMENDATION:2}
jazzlogs.chat.usage.stage-credit-cost.AGENT=${JAZZLOGS_CHAT_USAGE_CREDIT_COST_AGENT:15}
jazzlogs.chat.usage.pricing-version=${JAZZLOGS_CHAT_USAGE_PRICING_VERSION:2026-05-28}
jazzlogs.chat.usage.model-pricing.[gpt-5-nano].input-micros-usd-per-million-tokens=${JAZZLOGS_CHAT_USAGE_MODEL_PRICING_GPT_5_NANO_INPUT_MICROS_USD_PER_MILLION:50000}
jazzlogs.chat.usage.model-pricing.[gpt-5-nano].cached-input-micros-usd-per-million-tokens=${JAZZLOGS_CHAT_USAGE_MODEL_PRICING_GPT_5_NANO_CACHED_INPUT_MICROS_USD_PER_MILLION:5000}
jazzlogs.chat.usage.model-pricing.[gpt-5-nano].output-micros-usd-per-million-tokens=${JAZZLOGS_CHAT_USAGE_MODEL_PRICING_GPT_5_NANO_OUTPUT_MICROS_USD_PER_MILLION:400000}
jazzlogs.chat.usage.model-pricing.[gpt-5.4-nano].input-micros-usd-per-million-tokens=${JAZZLOGS_CHAT_USAGE_MODEL_PRICING_GPT_5_4_NANO_INPUT_MICROS_USD_PER_MILLION:200000}
jazzlogs.chat.usage.model-pricing.[gpt-5.4-nano].cached-input-micros-usd-per-million-tokens=${JAZZLOGS_CHAT_USAGE_MODEL_PRICING_GPT_5_4_NANO_CACHED_INPUT_MICROS_USD_PER_MILLION:20000}
jazzlogs.chat.usage.model-pricing.[gpt-5.4-nano].output-micros-usd-per-million-tokens=${JAZZLOGS_CHAT_USAGE_MODEL_PRICING_GPT_5_4_NANO_OUTPUT_MICROS_USD_PER_MILLION:1250000}
jazzlogs.chat.usage.model-pricing.[gpt-5.4-mini].input-micros-usd-per-million-tokens=${JAZZLOGS_CHAT_USAGE_MODEL_PRICING_GPT_5_4_MINI_INPUT_MICROS_USD_PER_MILLION:750000}
jazzlogs.chat.usage.model-pricing.[gpt-5.4-mini].cached-input-micros-usd-per-million-tokens=${JAZZLOGS_CHAT_USAGE_MODEL_PRICING_GPT_5_4_MINI_CACHED_INPUT_MICROS_USD_PER_MILLION:75000}
jazzlogs.chat.usage.model-pricing.[gpt-5.4-mini].output-micros-usd-per-million-tokens=${JAZZLOGS_CHAT_USAGE_MODEL_PRICING_GPT_5_4_MINI_OUTPUT_MICROS_USD_PER_MILLION:4500000}
jazzlogs.chat.usage.period-duration=${JAZZLOGS_CHAT_USAGE_PERIOD_DURATION:P30D}
springdoc.swagger-ui.path=/swagger-ui.html

server.shutdown=graceful
