spring.application.name=jazzlogs
logging.level.root=INFO
logging.level.com.marcoromanofinaa.jazzlogs=INFO
logging.level.com.marcoromanofinaa.jazzlogs.ai.semantic=${JAZZLOGS_LOG_AI_SEMANTIC:INFO}
logging.level.com.marcoromanofinaa.jazzlogs.spotify=${JAZZLOGS_LOG_SPOTIFY:INFO}
logging.level.org.springframework.web.client=INFO
logging.level.org.hibernate.SQL=INFO

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jazzlogs}
spring.datasource.username=${DB_USERNAME:jazzlogs}
spring.datasource.password=${DB_PASSWORD:jazzlogs}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.autoconfigure.exclude=${SPRING_AUTOCONFIGURE_EXCLUDE:\
org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration}
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
spring.ai.openai.embedding.options.dimensions=${OPENAI_EMBEDDING_DIMENSIONS:1536}
spring.ai.vectorstore.pgvector.initialize-schema=${JAZZLOGS_PGVECTOR_INITIALIZE_SCHEMA:true}
spring.ai.vectorstore.pgvector.schema-validation=${JAZZLOGS_PGVECTOR_SCHEMA_VALIDATION:false}
spring.ai.vectorstore.pgvector.dimensions=${OPENAI_EMBEDDING_DIMENSIONS:1536}
spring.ai.vectorstore.pgvector.distance-type=${JAZZLOGS_PGVECTOR_DISTANCE_TYPE:cosine-distance}
spring.ai.vectorstore.pgvector.table-name=${JAZZLOGS_PGVECTOR_TABLE_NAME:semantic_documents}

jazzlogs.admin.api-key=${JAZZLOGS_ADMIN_API_KEY:}
jazzlogs.spotify.client-id=${SPOTIFY_CLIENT_ID:}
jazzlogs.spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
jazzlogs.spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:8080/admin/spotify/callback}
jazzlogs.spotify.playlist-id=${SPOTIFY_PLAYLIST_ID:}
jazzlogs.spotify.market=${SPOTIFY_MARKET:AR}
jazzlogs.spotify.sync.enabled=${SPOTIFY_SYNC_ENABLED:false}
jazzlogs.spotify.sync.cron=${SPOTIFY_SYNC_CRON:0 0 */12 * * *}
jazzlogs.spotify.sync.zone=${SPOTIFY_SYNC_ZONE:America/Argentina/Buenos_Aires}
jazzlogs.ai.semantic.indexing.retry.recovery-batch-size=${JAZZLOGS_AI_SEMANTIC_INDEXING_RETRY_RECOVERY_BATCH_SIZE:25}
jazzlogs.ai.semantic.indexing.recovery.enabled=${JAZZLOGS_AI_SEMANTIC_INDEXING_RECOVERY_ENABLED:true}
jazzlogs.ai.semantic.indexing.recovery.cron=${JAZZLOGS_AI_SEMANTIC_INDEXING_RECOVERY_CRON:0 */10 * * * *}
jazzlogs.ai.semantic.indexing.recovery.zone=${JAZZLOGS_AI_SEMANTIC_INDEXING_RECOVERY_ZONE:America/Argentina/Buenos_Aires}
springdoc.swagger-ui.path=/swagger-ui.html

server.shutdown=graceful
